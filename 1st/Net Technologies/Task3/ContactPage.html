<!DOCTYPE html>
<html>
	<head>
		<title>ContactPage</title>

		<!-- For greek language and more -->
        <meta charset="utf-8">

        <!-- linked CSS file -->
        <link rel="stylesheet" type="text/css" href="Css1.css"> 
	</head>
	<body>
		<form>
			<fieldset>
				<legend>Contact Form</legend>

				First Name:<br><input type="text" size="30" name="firstname"><br>
				Last Name:<br><input type="text" size="30" name="lastname"><br>
				Date:<br><input placeholder="DD / MM /YY" type="text" size="30" name="date"><br>
				Phone:<br><input type="text" size="30" name="phone"><br>
				E-mail:<br><input placeholder="example@example.exaple" type="email" size="30" name="email"><br>
				Zip Code:<br><input type="text" size="30" name="zcode"><br>
				Address:<br><input type="text" size="30" name="addr"><br>
				Message:<textarea rows="10" cols="50" name="message"></textarea><br>
				<input type="submit" value="Submit">
				<input type="reset" value="Cancel">
			</fieldset>
		</form>

	</body>
</html>
